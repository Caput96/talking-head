name: CI

# Minimal gate: run lint + typecheck + unit tests on every push and pull request.
# Deliberately no build/deploy here — those come in later phases.
on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install pnpm before Node so setup-node can cache the pnpm store.
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

  # Separate job for the Python /server (ADR-004). Runs on ubuntu with the
  # portable deps only — the stub backend has no macOS/MLX requirement, so CI
  # exercises the seam cross-platform. The MLX extra (darwin-only) is not synced.
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - run: uv sync --locked
        working-directory: server

      - run: uv run pytest
        working-directory: server
